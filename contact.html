<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduTech Creations | Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="logo">EduTech Creations</div>

  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="courses.html">Courses</a>
    <a href="feature.html">Features</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>
</header>

<main>

  <section class="contact section-box">
    <div class="contact-content">
      <p class="section-label">Contact us</p>
      <h1>Have a question? We would like to hear from you</h1>
      <p>
        Send us your message and our team will get back to you regarding courses,
        learning support, or enrollment details.
      </p>
    </div>

    <form class="contact-form">
      <label for="name">Your name</label>
      <input type="text" id="name" placeholder="Enter your name" required>

      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <label for="message">Message</label>
      <textarea id="message" placeholder="Write your message" rows="5" required></textarea>

      <button type="submit">Send Message</button>

      <p id="form-message"></p>
    </form>
  </section>

</main>

<footer>
  <p>© 2026 EduTech Creations. All rights reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
